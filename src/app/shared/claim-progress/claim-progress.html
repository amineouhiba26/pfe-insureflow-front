<div class="w-full py-4">
  <div class="flex items-center justify-between">
    <ng-container *ngFor="let step of steps; let i = index">

      <!-- Step circle -->
      <div class="flex flex-col items-center flex-1">
        <div class="relative flex items-center justify-center">

          <!-- Connector line left -->
          <div *ngIf="i > 0"
               class="absolute right-1/2 top-1/2 -translate-y-1/2 h-0.5 w-full"
               [ngClass]="isCompleted(i) ? 'bg-blue-600' : 'bg-gray-200'">
          </div>

          <!-- Circle -->
          <div class="relative z-10 w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold border-2 transition-all duration-500"
               [ngClass]="{
                 'bg-blue-600 border-blue-600 text-white': isCompleted(i),
                 'bg-white border-blue-600 text-blue-600 shadow-lg scale-110': isActive(i),
                 'bg-white border-gray-300 text-gray-400': !isCompleted(i) && !isActive(i)
               }">
            <span *ngIf="isCompleted(i)">✓</span>
            <span *ngIf="!isCompleted(i)">{{ step.icon }}</span>
          </div>
        </div>

        <!-- Label -->
        <div class="mt-2 text-xs text-center font-medium"
             [ngClass]="{
               'text-blue-600': isActive(i) || isCompleted(i),
               'text-gray-400': !isActive(i) && !isCompleted(i)
             }">
          <span *ngIf="i < 5">{{ step.label }}</span>
          <span *ngIf="i === 5" [ngClass]="getFinalColor()">{{ getFinalLabel() }}</span>
        </div>
      </div>

    </ng-container>
  </div>

  <!-- Pulsing indicator when processing -->
  <div *ngIf="!['APPROVED','REJECTED','PENDING_REVIEW'].includes(status)"
       class="mt-4 flex items-center justify-center gap-2 text-sm text-blue-600">
    <div class="w-2 h-2 rounded-full bg-blue-600 animate-ping"></div>
    <span>Traitement en cours...</span>
  </div>
</div>
