<div class="w-full py-6">
  <div class="relative flex items-center justify-between">
    <!-- Background Connector Tracks (one per gap) -->
    <div class="absolute top-[14px] left-0 w-full flex justify-between px-[14px] -z-0">
      <div *ngFor="let step of steps; let i = index; let last = last"
           class="h-[2px] grow"
           [class.hidden]="last"
           [ngClass]="getConnectorClass(i)">
      </div>
    </div>

    <ng-container *ngFor="let step of steps; let i = index">
      <div class="relative z-10 flex flex-col items-center">
        <!-- Circle -->
        <div class="w-7 h-7 rounded-full flex items-center justify-center transition-all duration-300"
             [ngClass]="getStepCircleClass(i)">
          
          <!-- Checkmark for completed -->
          <svg *ngIf="isCompleted(i) || (i === 5 && status === 'APPROVED')" class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
          </svg>

          <!-- X for rejected final -->
          <svg *ngIf="i === 5 && status === 'REJECTED'" class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
          </svg>

          <!-- Dot for active -->
          <div *ngIf="isActive(i) && i < 5" class="w-2 h-2 rounded-full bg-indigo-600 animate-pulse"></div>
          
          <!-- Initial for pending -->
          <div *ngIf="!isCompleted(i) && !isActive(i) && i < 5" class="w-1.5 h-1.5 rounded-full bg-slate-200"></div>
          <div *ngIf="i === 5 && !finalStatuses.includes(status)" class="w-1.5 h-1.5 rounded-full bg-slate-200"></div>
        </div>

        <!-- Label -->
        <div class="mt-2 text-[10px] font-semibold uppercase tracking-wider text-center"
             [ngClass]="getLabelClass(i)">
          <span *ngIf="i < 5">{{ step.label }}</span>
          <span *ngIf="i === 5">{{ getFinalLabel() }}</span>
        </div>
      </div>
    </ng-container>
  </div>
</div>
