<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">InsureFlow</h1>
      <p class="text-gray-500 mt-1">Espace Client</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">

      <h2 class="text-xl font-bold text-gray-800 mb-6">Connexion</h2>

      <!-- Error -->
      <div *ngIf="error"
           class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">
        {{ error }}
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Nom complet
          </label>
          <input [(ngModel)]="fullName"
                 type="text"
                 placeholder="ex: Ali Al Mansouri"
                 (keyup.enter)="login()"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Numéro CIN
          </label>
          <input [(ngModel)]="cin"
                 type="text"
                 placeholder="ex: 05739884"
                 (keyup.enter)="login()"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm transition">
        </div>

        <button (click)="login()"
                [disabled]="loading"
                class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 disabled:opacity-50 transition text-sm mt-2">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </div>

      <!-- Link to admin -->
      <div class="mt-6 text-center">
        <a routerLink="/admin/login"
           class="text-xs text-gray-400 hover:text-gray-600 transition">
          Accès administrateur →
        </a>
      </div>

    </div>
  </div>
</div>
