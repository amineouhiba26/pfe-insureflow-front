<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🛡️</div>
      <h1 class="text-3xl font-bold text-gray-800">InsureFlow</h1>
      <p class="text-gray-500 mt-1">Traitement intelligent des sinistres</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

      <!-- Tabs -->
      <div class="flex">
        <button (click)="tab='client'"
                class="flex-1 py-4 text-sm font-semibold transition-all"
                [ngClass]="tab==='client'
                  ? 'bg-blue-600 text-white'
                  : 'bg-gray-50 text-gray-500 hover:bg-gray-100'">
          👤 Espace Client
        </button>
        <button (click)="tab='admin'"
                class="flex-1 py-4 text-sm font-semibold transition-all"
                [ngClass]="tab==='admin'
                  ? 'bg-indigo-600 text-white'
                  : 'bg-gray-50 text-gray-500 hover:bg-gray-100'">
          🔐 Administration
        </button>
      </div>

      <div class="p-8">

        <!-- Error -->
        <div *ngIf="error"
             class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
          {{ error }}
        </div>

        <!-- Client Login -->
        <form *ngIf="tab==='client'" (ngSubmit)="loginClient()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
              <input [(ngModel)]="fullName" name="fullName" type="text"
                     placeholder="Ali Al Mansouri"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Numéro CIN</label>
              <input [(ngModel)]="cin" name="cin" type="text"
                     placeholder="05739884"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>
            <button type="submit" [disabled]="loading"
                    class="w-full py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 disabled:opacity-50 transition">
              {{ loading ? 'Connexion...' : 'Se connecter' }}
            </button>
          </div>
        </form>

        <!-- Admin Login -->
        <form *ngIf="tab==='admin'" (ngSubmit)="loginAdmin()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Identifiant</label>
              <input [(ngModel)]="username" name="username" type="text"
                     placeholder="admin"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
              <input [(ngModel)]="password" name="password" type="password"
                     placeholder="••••••••"
                     class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
            </div>
            <button type="submit" [disabled]="loading"
                    class="w-full py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition">
              {{ loading ? 'Connexion...' : 'Accéder au panneau admin' }}
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
