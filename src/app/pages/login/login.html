<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md text-center">

    <div class="text-6xl mb-4">🛡️</div>
    <h1 class="text-3xl font-bold text-gray-800 mb-2">InsureFlow</h1>
    <p class="text-gray-500 mb-8">Espace Client</p>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <p class="text-gray-600 mb-6 text-sm">
        Connectez-vous avec votre compte InsureFlow
      </p>
      <button (click)="login()"
              class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition text-sm">
        Se connecter
      </button>
    </div>

    <div class="mt-4">
      <a routerLink="/admin/login"
         class="text-xs text-gray-400 hover:text-gray-600">
        Accès administrateur →
      </a>
    </div>
  </div>
</div>
