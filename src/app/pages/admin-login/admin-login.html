<div class="min-h-screen bg-gradient-to-br from-slate-800 to-indigo-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">InsureFlow</h1>
      <p class="text-indigo-300 mt-1">Espace Administration</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">

      <h2 class="text-xl font-bold text-gray-800 mb-6">Connexion Administrateur</h2>

      <!-- Error -->
      <div *ngIf="error"
           class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">
        {{ error }}
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Identifiant
          </label>
          <input [(ngModel)]="username"
                 type="text"
                 placeholder="admin"
                 (keyup.enter)="login()"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm transition">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Mot de passe
          </label>
          <input [(ngModel)]="password"
                 type="password"
                 placeholder="••••••••"
                 (keyup.enter)="login()"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-sm transition">
        </div>

        <button (click)="login()"
                [disabled]="loading"
                class="w-full py-3 bg-indigo-700 text-white font-semibold rounded-xl hover:bg-indigo-800 disabled:opacity-50 transition text-sm mt-2">
          {{ loading ? 'Connexion...' : 'Accéder au panneau admin' }}
        </button>
      </div>

      <!-- Link back to client -->
      <div class="mt-6 text-center">
        <a routerLink="/login"
           class="text-xs text-gray-400 hover:text-gray-600 transition">
          ← Espace client
        </a>
      </div>

    </div>

    <!-- Security notice -->
    <p class="text-center text-xs text-indigo-400 mt-6">
       Accès réservé aux adjudicateurs autorisés
    </p>

  </div>
</div>
