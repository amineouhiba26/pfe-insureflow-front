<div class="min-h-screen bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🛡️</span>
        <span class="text-xl font-bold text-gray-800">InsureFlow</span>
      </div>
      <a routerLink="/dashboard"
         class="text-sm text-gray-600 hover:text-gray-800 transition">
        ← Retour
      </a>
    </div>
  </nav>

  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Nouveau sinistre</h1>
    <p class="text-gray-500 mb-8">Remplissez le formulaire et nos agents IA analyseront votre dossier automatiquement.</p>

    <div class="bg-white rounded-2xl shadow-sm p-8">

      <!-- Error -->
      <div *ngIf="error"
           class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">
        {{ error }}
      </div>

      <div class="space-y-6">

        <!-- Policy ID -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            Numéro de police <span class="text-red-500">*</span>
          </label>
          <input [(ngModel)]="policyId" type="text"
                 placeholder="ex: 20f94ac9-fbc0-4231-9018-860c51515201"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm">
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            Description du sinistre <span class="text-red-500">*</span>
          </label>
          <textarea [(ngModel)]="description" rows="4"
                    placeholder="Décrivez précisément ce qui s'est passé, le lieu, la date, les dommages..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm resize-none">
          </textarea>
        </div>

        <!-- Client estimated cost -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            Votre estimation du coût (TND)
          </label>
          <input [(ngModel)]="clientEstimatedCost" type="number" min="0"
                 placeholder="ex: 3000"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-sm">
          <p class="text-xs text-gray-400 mt-1">
            Cette information aide notre système à détecter les incohérences de prix
          </p>
        </div>

        <!-- Photo upload -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            Photos des dommages
          </label>
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition">
            <div class="text-center">
              <div class="text-3xl mb-1">📸</div>
              <p class="text-sm text-gray-500">Cliquez pour sélectionner vos photos</p>
              <p class="text-xs text-gray-400">JPG, PNG, WEBP — plusieurs fichiers acceptés</p>
            </div>
            <input type="file" accept="image/*" multiple class="hidden"
                   (change)="onFilesSelected($event)">
          </label>

          <!-- Photo previews -->
          <div *ngIf="previews.length > 0" class="mt-4 grid grid-cols-3 gap-3">
            <div *ngFor="let preview of previews; let i = index"
                 class="relative group">
              <img [src]="preview" class="w-full h-24 object-cover rounded-lg">
              <button (click)="removePhoto(i)"
                      class="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full text-xs opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                ×
              </button>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button (click)="submit()" [disabled]="loading"
                class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 disabled:opacity-50 transition text-sm">
          <span *ngIf="!loading">🚀 Soumettre le sinistre</span>
          <span *ngIf="loading">⏳ Soumission en cours...</span>
        </button>

      </div>
    </div>
  </div>
</div>
