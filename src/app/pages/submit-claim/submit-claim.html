<div class="min-h-screen bg-slate-50 flex flex-col font-sans">

  <!-- Compact Navbar -->
  <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 h-16 flex items-center">
    <div class="max-w-[800px] w-full mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg width="28" height="34" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 0L20 40V120C20 175.2 54.2 225.8 100 240C145.8 225.8 180 175.2 180 120V40L100 0Z" fill="#1E293B"/>
            <circle cx="100" cy="110" r="25" fill="#10B981"/>
            <path d="M102 95L92 112H108L98 125" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="text-base font-bold tracking-tight -mb-1">
            <span class="text-[#2d3192]">Insure</span><span class="text-[#00a859]">Flow</span>
        </span>
      </div>
      <a routerLink="/dashboard"
         class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Annuler
      </a>
    </div>
  </nav>

  <div class="max-w-[800px] w-full mx-auto px-6 py-12 grow overflow-y-auto custom-scrollbar">
    <div class="mb-10 text-center fade-in-up">
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight mb-1">Nouveau Sinistre</h1>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Enregistrement et analyse agentique</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-10 fade-in-up">
      <div class="space-y-8">

        <!-- Policy Selection -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3 ml-1">
            Référence du Contrat <span class="text-red-500">*</span>
          </label>
          <input [(ngModel)]="policyId" type="text"
                 placeholder="Identifiant unique de votre contrat"
                 class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-300 outline-none text-[11px] font-mono transition-all">
        </div>

        <!-- Description -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3 ml-1">
            Description de l'Incident <span class="text-red-500">*</span>
          </label>
          <textarea [(ngModel)]="description" rows="5"
                    placeholder="Lieu, date, circonstances, tiers impliqués..."
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-300 outline-none text-xs font-medium resize-none transition-all">
          </textarea>
        </div>

        <!-- Cost -->
        <div class="max-w-[240px]">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3 ml-1">
            Estimation Coût (TND)
          </label>
          <div class="relative">
             <input [(ngModel)]="clientEstimatedCost" type="number" min="0"
                    placeholder="Montant"
                    class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-300 outline-none text-sm font-bold">
             <span class="absolute right-4 top-3 text-slate-300 font-bold text-xs">TND</span>
          </div>
        </div>

        <!-- Upload -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3 ml-1">
            Photos & Preuves
          </label>
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-200 rounded-xl cursor-pointer hover:border-slate-400 hover:bg-slate-50 transition-all group">
            <div class="flex flex-col items-center justify-center text-center">
              <svg class="w-6 h-6 text-slate-300 group-hover:text-slate-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 0 1 2-2h.93a2 2 0 0 0 1.664-.89l.812-1.22A2 2 0 0 1 10.07 4h3.86a2 2 0 0 1 1.664.89l.812 1.22A2 2 0 0 0 18.07 7H19a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/><circle cx="12" cy="13" r="4"/></svg>
              <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Ajouter des fichiers</p>
            </div>
            <input type="file" accept="image/*" multiple class="hidden"
                   (change)="onFilesSelected($event)">
          </label>

          <div *ngIf="previews.length > 0" class="mt-6 flex flex-wrap gap-3">
            <div *ngFor="let preview of previews; let i = index"
                 class="relative group w-20 h-20">
              <img [src]="preview" class="w-full h-full object-cover rounded-lg border border-slate-200">
              <button (click)="removePhoto(i)"
                      class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-slate-900 text-white rounded-full text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                ×
              </button>
            </div>
          </div>
        </div>

        <button (click)="submit()" [disabled]="loading"
                class="w-full py-4 bg-slate-900 text-white font-bold uppercase tracking-[0.2em] text-[10px] rounded-lg hover:bg-slate-800 disabled:opacity-50 transition-all shadow-md active:scale-95">
          <span *ngIf="!loading">Soumettre le Dossier</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-3">
             <div class="w-3 h-3 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
             Transmission...
          </span>
        </button>

      </div>
    </div>
  </div>
</div>
